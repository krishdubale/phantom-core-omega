name: PhantomCore Omega — Full Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

env:
  # Opt into Node.js 24 to silence Node 20 deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-windows-exe:
    name: Build Windows Daemon
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            pc_daemon/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('pc_daemon/Cargo.lock') }}

      - name: Build PC Daemon (release)
        working-directory: pc_daemon
        run: cargo build --release

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: phantom-core-daemon-windows
          path: pc_daemon/target/release/phantom-core-daemon.exe

  build-android-apks:
    name: Build Android APKs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Accept SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Set up Gradle 8.5
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'

      - name: Generate Gradle Wrapper (proxy_app)
        working-directory: android/proxy_app
        run: gradle wrapper --gradle-version 8.5

      - name: Generate Gradle Wrapper (demo_app)
        working-directory: android/demo_app
        run: gradle wrapper --gradle-version 8.5

      - name: Build Proxy APK
        working-directory: android/proxy_app
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace > build_log.txt 2>&1 || {
            echo "Build failed, committing log..."
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add build_log.txt
            git commit -m "Upload failed build log"
            git push
            exit 1
          }
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/25.2.9519653

      - name: Build Demo APK
        working-directory: android/demo_app
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: |
            android/proxy_app/app/build/outputs/apk/debug/*.apk
            android/demo_app/app/build/outputs/apk/debug/*.apk

  generate-docs:
    name: Generate Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install matplotlib numpy python-pptx

      - name: Create output directories
        run: mkdir -p docs/benchmark_results

      - name: Generate benchmark report
        working-directory: scripts
        run: python benchmark_runner.py --demo --output-dir ../docs/benchmark_results/
        env:
          PYTHONIOENCODING: utf-8

      - name: Generate final report PDF
        working-directory: scripts
        run: python generate_report.py ../docs/phantom_core_report.pdf
        env:
          PYTHONIOENCODING: utf-8

      - name: Upload documentation
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: |
            docs/*.pdf
            docs/benchmark_results/*.png
            docs/benchmark_results/*.pdf
