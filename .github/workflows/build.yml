name: PhantomCore Omega — Full Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            pc_daemon/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('pc_daemon/Cargo.lock') }}

      - name: Build PC Daemon (release + LTO)
        run: |
          cd pc_daemon
          cargo build --release
        env:
          RUSTFLAGS: "-C target-cpu=native"

      - name: Run tests
        run: |
          cd pc_daemon
          cargo test --release

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: phantom-core-daemon-windows
          path: pc_daemon/target/release/phantom-core-daemon.exe

  build-android-apks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager --install "ndk;25.2.9519653" "cmake;3.22.1"

      - name: Create Gradle Wrapper (proxy)
        run: |
          cd android/proxy_app
          gradle wrapper --gradle-version 8.5

      - name: Build Proxy APK
        run: |
          cd android/proxy_app
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Create Gradle Wrapper (demo)
        run: |
          cd android/demo_app
          gradle wrapper --gradle-version 8.5

      - name: Build Demo APK
        run: |
          cd android/demo_app
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: |
            android/proxy_app/app/build/outputs/apk/debug/*.apk
            android/demo_app/app/build/outputs/apk/debug/*.apk

  generate-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        run: pip install matplotlib numpy

      - name: Generate benchmark report (demo data)
        run: |
          cd scripts
          python benchmark_runner.py --demo --output-dir ../docs/benchmark_results/

      - name: Generate final report PDF
        run: |
          cd scripts
          python generate_report.py ../docs/phantom_core_report.pdf

      - name: Upload documentation
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: |
            docs/*.pdf
            docs/benchmark_results/*.png
